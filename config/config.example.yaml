  - id: northryde
    name: "North Ryde Golf Club"
    platform: miclub
    url: "https://northryde.miclub.com.au/guests/bookings/ViewPublicCalendar.msp?booking_resource_id=3000000"
    options:
      booking_resource_id: 3000000

  # This club's url has no resource id; it's supplied via options instead.
  - id: coast
    name: "Coast Golf Club"
    platform: miclub
    url: "https://www.coastgolf.com.au/guests/bookings/ViewPublicCalendar.msp"
    options:
      booking_resource_id: 3000000

  - id: longreef
    name: "Long Reef Golf Club"
    platform: miclub
    url: "https://longreef.miclub.com.au/guests/bookings/ViewPublicCalendar.msp?booking_resource_id=3000000"
    options:
      booking_resource_id: 3000000

  - id: monavale
    name: "Mona Vale Golf Club"
    platform: miclub
    url: "https://www.mvgc.com.au/guests/bookings/ViewPublicCalendar.msp?booking_resource_id=3000000"
    options:
      booking_resource_id: 3000000

  - id: balgowlah
    name: "Balgowlah Golf Club"
    platform: miclub
    url: "https://www.balgowlahgolfclub.com.au/guests/bookings/ViewPublicCalendar.msp?booking_resource_id=3000000"
    options:
      booking_resource_id: 3000000

  - id: chatswood
    name: "Chatswood Golf Club"
    platform: miclub
    url: "https://chatswood.miclub.com.au/guests/bookings/ViewPublicCalendar.msp?booking_resource_id=3000000"
    options:
      booking_resource_id: 3000000

  - id: carnarvon
    name: "Carnarvon Golf Club"
