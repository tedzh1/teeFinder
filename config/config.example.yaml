    options:
      booking_resource_id: 3000000

  # An offline example for local testing — the `fixture` scraper reads tee
  # times from a local JSON file instead of the network.
  - id: demo
    name: "Demo Club (offline fixture)"
    platform: fixture
    url: "./tests/fixtures/demo_slots.json"
    options: {}

# Users are now managed through the web app (register at /register, then set
# preferences). They live in the database, not here.
#
# The block below is OPTIONAL and only read by `teefinder seed-users`, a one-off
# helper that imports these into the DB (each gets a random temporary password,
# printed by the command). Leave it commented out unless you want to seed.
#
# users:
#   - name: Ted
#     email: ted@example.com
#     clubs: [wakehurst, northbridge, eastlake, moorepark, strathfield, northryde, demo]
#     min_players: 2
#     preferences:
#       - days: [Saturday, Sunday]
#         time_ranges:
#           - { start: "06:00", end: "10:00" }
#       - days: [Wednesday]
#         time_ranges:
#           - { start: "15:00", end: "18:00" }
